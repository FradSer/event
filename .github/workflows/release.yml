name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release
        run: |
          swift build -c release

      - name: Determine architecture
        id: arch
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            echo "suffix=arm64" >> $GITHUB_OUTPUT
          else
            echo "suffix=x86_64" >> $GITHUB_OUTPUT
          fi

      - name: Create archive
        run: |
          cd .build/release
          zip -r event-macos-${{ steps.arch.outputs.suffix }}.zip event

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: .build/release/event-macos-${{ steps.arch.outputs.suffix }}.zip
          generate_release_notes: true
          body: |
            ## Installation

            ### Homebrew (Recommended)
            ```bash
            brew tap FradSer/brew
            brew install event
            ```

            ### Build from Source
            ```bash
            swift build -c release
            ```
