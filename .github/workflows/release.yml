name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release
        run: |
          swift build -c release

      - name: Create archive
        run: |
          cp .build/release/event ./
          zip -r event-macos.zip event

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: event-macos.zip
          generate_release_notes: true
          body: |
            ## Installation

            ### Homebrew
            ```bash
            brew tap FradSer/brew
            brew install event
            ```

            ### Direct Download
            - `event-macos.zip` - Precompiled binary for macOS

            ### Build from Source
            ```bash
            swift build -c release
            ```
